# Valida todo laudo que chega contra o schema. Um laudo malformado nunca entra na Caderneta.
name: validar-laudo

on:
  push:
    paths:
      - "data/laudos/*.json"
      - "data/latest.json"
      - "site/laudo.schema.json"
      - "scripts/validar.py"
      - ".github/workflows/validate-laudo.yml"
  pull_request:
    paths:
      - "data/laudos/*.json"
      - "data/latest.json"
      - "site/laudo.schema.json"
      - "scripts/validar.py"
      - ".github/workflows/validate-laudo.yml"

jobs:
  validar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install jsonschema
      - name: validar contra schema
        run: python scripts/validar.py
