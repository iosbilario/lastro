<!doctype html>
<!--
  Lastro : site (GitHub Pages). ESQUELETO orientado a dados.

  A fonte de verdade VISUAL e ../design/lastro-passaporte.html (o laudo em papel-cedula,
  com o selo guilloche, a Caderneta e o Observatorio). O trabalho do Claude Code aqui e:
  PORTAR aquele markup/CSS para ca e LIGAR cada campo ao laudo.json abaixo, em vez dos
  valores fixos do mockup. Este arquivo so prova o carregamento dos dados.

  Nada de backend: tudo e fetch de JSON estatico versionado no repo.
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lastro : passaporte de saude</title>
<style>
  body{font-family:system-ui,sans-serif;max-width:620px;margin:40px auto;padding:0 18px;color:#15251C}
  .todo{border:1.5px dashed #A9741A;background:#fdf6e8;padding:12px 14px;font-size:13px;margin-bottom:24px}
  h1{font-size:20px} .big{font-size:40px;font-weight:700} pre{background:#f3f4ee;padding:12px;overflow:auto;font-size:12px}
</style>

<div class="todo">
  <b>Esqueleto.</b> Portar o visual de <code>design/lastro-passaporte.html</code> e ligar aos dados.
  Este placeholder so carrega <code>data/latest.json</code> e a Caderneta de <code>data/laudos/</code>.
</div>

<h1 id="modelo">carregando...</h1>
<div>prognostico: <span class="big" id="prog">--</span></div>
<div>gargalo: <b id="gargalo">--</b> | base amostral: <span id="base">--</span></div>

<h3>orgaos</h3>
<pre id="orgaos">--</pre>

<h3>caderneta (desgaste do SSD por afericao)</h3>
<pre id="caderneta">--</pre>

<script>
async function j(url){ const r = await fetch(url); if(!r.ok) throw new Error(url); return r.json(); }

(async () => {
  try {
    // caminhos relativos ao publicar site/ como raiz do Pages; ajustar se publicar o repo inteiro
    const base = location.pathname.includes('/site/') ? '../data' : 'data';
    const latest = await j(`${base}/latest.json`);

    document.getElementById('modelo').textContent =
      `${latest.maquina.modelo} : serie ${latest.serie}`;
    if (latest.prognostico) {
      const m = latest.prognostico.meses_restantes;
      document.getElementById('prog').textContent =
        `~${Math.floor(m/12)}a ${m%12}m`;
      document.getElementById('gargalo').textContent = latest.prognostico.gargalo;
      document.getElementById('base').textContent = latest.prognostico.base_amostral;
    }
    document.getElementById('orgaos').textContent = JSON.stringify(latest.orgaos, null, 2);

    // Caderneta: cada laudo do historico e um ponto. TODO: virar sparkline SVG (ver mockup).
    const datas = ["2026-01-15","2026-02-14","2026-03-16","2026-04-15","2026-05-16","2026-07-03"];
    const pontos = [];
    for (const d of datas) {
      try { const l = await j(`${base}/laudos/${d}.json`); pontos.push(`${d}: SSD ${Math.round(l.orgaos.ssd.desgaste*100)}%`); }
      catch(e){}
    }
    document.getElementById('caderneta').textContent = pontos.join("\n");
  } catch (e) {
    document.getElementById('modelo').textContent = "erro ao carregar dados: " + e.message;
  }
})();
</script>
